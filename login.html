<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="宿舍智能推荐系统-登录页" />
    <title>学号登录 - 宿舍智能推荐系统</title>
    <link href="css/styles.css" rel="stylesheet" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
</head>
<body class="bg-primary">
    <div id="layoutAuthentication">
        <div id="layoutAuthentication_content">
            <main>
                <div class="container">
                    <div class="row justify-content-center">
                        <div class="col-lg-5">
                            <div class="card shadow-lg border-0 rounded-lg mt-5">
                                <div class="card-header"><h3 class="text-center font-weight-light my-4">学号认证登录</h3></div>
                                <div class="card-body">
                                    <form>
                                        <div class="form-floating mb-3">
                                            <input class="form-control" id="inputStudentId" type="text" placeholder="请输入学号" />
                                            <label for="inputStudentId">学号</label>
                                        </div>
                                        <div class="form-floating mb-3">
                                            <input class="form-control" id="inputPassword" type="password" placeholder="请输入密码" />
                                            <label for="inputPassword">密码</label>
                                        </div>
                                        <div class="form-check mb-3">
                                            <input class="form-check-input" id="inputRemember" type="checkbox" />
                                            <label class="form-check-label" for="inputRemember">记住密码</label>
                                        </div>
                                        <div class="d-grid">
                                            <button type="button" class="btn btn-primary" onclick="userLogin()">登录系统</button>
                                        </div>
                                    </form>
                                </div>
                                <div class="card-footer text-center py-3">
                                    <div class="small"><a href="register.html">没有账号？立即注册</a></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
        <div id="layoutAuthentication_footer">
            <footer class="py-4 bg-light mt-auto">
                <div class="container-fluid px-4">
                    <div class="d-flex align-items-center justify-content-between small">
                        <div class="text-muted">Copyright &copy; 宿舍智能推荐系统 2026</div>
                        <div>
                            <a href="#">隐私说明</a>
                            &middot;
                            <a href="#">使用条款</a>
                        </div>
                    </div>
                </div>
            </footer>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/scripts.js"></script>
    <script>
        window.onload = function () {
            let remember = localStorage.getItem("rememberUser");
            if (remember) {
                let user = JSON.parse(remember);
                document.getElementById("inputStudentId").value = user.studentId;
                document.getElementById("inputPassword").value = user.password;
                document.getElementById("inputRemember").checked = true;
            }
        };

        function userLogin() {
            let studentId = document.getElementById("inputStudentId").value.trim();
            let password = document.getElementById("inputPassword").value.trim();
            let remember = document.getElementById("inputRemember").checked;

            if (!studentId || !password) {
                alert("请输入学号和密码！");
                return;
            }

            let userList = JSON.parse(localStorage.getItem("userList") || "[]");
            let user = userList.find(u => u.studentId === studentId && u.password === password);

            if (!user) {
                alert("学号或密码错误，或未注册！");
                return;
            }

            alert("登录成功！欢迎 " + user.name);
            
            if (remember) {
                localStorage.setItem("rememberUser", JSON.stringify({
                    studentId: studentId,
                    password: password
                }));
            } else {
                localStorage.removeItem("rememberUser");
            }

            localStorage.setItem("currentUser", JSON.stringify(user));
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
