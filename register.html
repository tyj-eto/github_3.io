<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="宿舍智能推荐系统-注册页" />
    <meta name="author" content="" />
    <title>新用户注册 - 宿舍智能推荐系统</title>
    <link href="css/styles.css" rel="stylesheet" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
</head>
<body class="bg-primary">
    <div id="layoutAuthentication">
        <div id="layoutAuthentication_content">
            <main>
                <div class="container">
                    <div class="row justify-content-center">
                        <div class="col-lg-7">
                            <div class="card shadow-lg border-0 rounded-lg mt-5">
                                <div class="card-header"><h3 class="text-center font-weight-light my-4">新用户注册</h3></div>
                                <div class="card-body">
                                    <form>
                                        <div class="row mb-3">
                                            <div class="col-md-6">
                                                <div class="form-floating mb-3 mb-md-0">
                                                    <input class="form-control" id="inputStudentId" type="text" placeholder="请输入学号" />
                                                    <label for="inputStudentId">学号</label>
                                                </div>
                                            </div>
                                            <div class="col-md-6">
                                                <div class="form-floating">
                                                    <input class="form-control" id="inputName" type="text" placeholder="请输入姓名" />
                                                    <label for="inputName">姓名</label>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="form-floating mb-3">
                                            <input class="form-control" id="inputCollege" type="text" placeholder="请输入学院" />
                                            <label for="inputCollege">学院</label>
                                        </div>
                                        <div class="row mb-3">
                                            <div class="col-md-6">
                                                <div class="form-floating mb-3 mb-md-0">
                                                    <input class="form-control" id="inputPassword" type="password" placeholder="请设置密码" />
                                                    <label for="inputPassword">设置密码</label>
                                                </div>
                                            </div>
                                            <div class="col-md-6">
                                                <div class="form-floating mb-3 mb-md-0">
                                                    <input class="form-control" id="inputPasswordConfirm" type="password" placeholder="请确认密码" />
                                                    <label for="inputPasswordConfirm">确认密码</label>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="mt-4 mb-0">
                                            <div class="d-grid">
                                                <button type="button" class="btn btn-primary btn-block" onclick="register()">注册账号</button>
                                            </div>
                                        </div>
                                    </form>
                                </div>
                                <div class="card-footer text-center py-3">
                                    <div class="small"><a href="login.html">已有账号？立即登录</a></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
        <div id="layoutAuthentication_footer">
            <footer class="py-4 bg-light mt-auto">
                <div class="container-fluid px-4">
                    <div class="d-flex align-items-center justify-content-between small">
                        <div class="text-muted">Copyright &copy; 宿舍智能推荐系统 2026</div>
                        <div>
                            <a href="#">隐私说明</a>
                            &middot;
                            <a href="#">使用条款</a>
                        </div>
                    </div>
                </div>
            </footer>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="js/scripts.js"></script>
    <script>
        function register() {
            let studentId = document.getElementById("inputStudentId").value.trim();
            let name = document.getElementById("inputName").value.trim();
            let college = document.getElementById("inputCollege").value.trim();
            let pwd = document.getElementById("inputPassword").value.trim();
            let pwd2 = document.getElementById("inputPasswordConfirm").value.trim();

            if (!studentId || !name || !college || !pwd || !pwd2) {
                alert("请填写完整信息！");
                return;
            }
            if (pwd !== pwd2) {
                alert("两次密码不一致！");
                return;
            }

            let userList = JSON.parse(localStorage.getItem("userList") || "[]");
            let exists = userList.some(u => u.studentId === studentId);

            if (exists) {
                alert("该学号已注册！");
                return;
            }

            userList.push({
                studentId: studentId,
                name: name,
                college: college,
                password: pwd
            });

            localStorage.setItem("userList", JSON.stringify(userList));
            alert("注册成功！请登录");
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
