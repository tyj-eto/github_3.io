            // ==============================================

            function calculateScore(user, s) {
                let score = 0;
                if(user.gender === s.gender) score +=15;
                if(user.mbti === s.mbti) score +=18;
                if(user.sleepTime === s.sleepTime) score +=20;
                if(user.cleanFreq === s.cleanFreq) score +=12;
                if(user.personality === s.personality) score +=8;
                if(user.mindNoise === s.mindNoise) score +=7;
                if(user.temp === s.temp) score +=6;
                if(user.studyGoal === s.studyGoal) score +=5;
                if(user.smoke === s.smoke) score +=4;
                if(user.mindSmoke === s.mindSmoke) score +=4;
                if(user.grade === s.grade) score +=3;
                if(user.major === s.major) score +=3;
                return Math.min(score, 100);
            }

                // 5. 渲染匹配结果（和你截图完全一致：我+3个舍友）
                document.getElementById('matchResult').classList.remove('d-none');
                // 计算综合匹配度（我+3个舍友的平均分）
                const avgScore = Math.round((top3.reduce((sum, s) => sum + s.score, 0) + 100) / 4);
                document.getElementById('matchScore').textContent = `${avgScore}%`;
                document.getElementById('assignDorm').textContent = dormNumber;
                document.getElementById('roommateResult').innerHTML = `
                    <div class="list-group-item">我（${userData.grade}｜${userData.major}｜${userData.mbti}）</div>
                    <div class="list-group-item">${top3[0].name}｜${top3[0].grade}｜${top3[0].mbti}｜匹配度 ${top3[0].score}%</div>
                    <div class="list-group-item">${top3[1].name}｜${top3[1].grade}｜${top3[1].mbti}｜匹配度 ${top3[1].score}%</div>
                    <div class="list-group-item">${top3[2].name}｜${top3[2].grade}｜${top3[2].mbti}｜匹配度 ${top3[2].score}%</div>
                `;
            });
        });
    </script>
</body>
</html>
